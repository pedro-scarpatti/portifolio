<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Pipeline — Pedro Scarpatti</title>
    <meta name="description" content="Demo interativa: simulador de pipeline de processamento de dados com fila FIFO, idempotência, estados e logging estruturado.">

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2307071A'/><text x='50%' y='55%' dominant-baseline='middle' text-anchor='middle' font-family='monospace' font-size='18' font-weight='bold' fill='%2300D4FF'>PS</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
    /* ============================================================
       TOKENS
       ============================================================ */
    :root {
      --bg:           #07071A;
      --bg-2:         #0D0D2B;
      --bg-card:      #11112A;
      --bg-card-2:    #181835;
      --border:       rgba(255,255,255,0.07);
      --border-accent:rgba(0,212,255,0.25);

      --text:         #EEEEF5;
      --text-2:       #9090A8;
      --text-3:       #5A5A75;

      --accent:       #00D4FF;
      --accent-2:     #00FF94;
      --accent-3:     #FF2D6B;

      --grad-accent:  linear-gradient(135deg, #00D4FF, #00FF94);
      --grad-hero:    linear-gradient(135deg, #00D4FF 0%, #00FF94 55%, #FF2D6B 100%);

      --font-head:    'Outfit', system-ui, sans-serif;
      --font-mono:    'Space Mono', monospace;

      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 16px;
      --r-xl: 20px;

      --shadow-card:  0 4px 24px rgba(0,0,0,0.4);
      --shadow-glow:  0 0 40px rgba(0,212,255,0.12);

      --transition:   all 0.25s cubic-bezier(0.16,1,0.3,1);
    }

    /* ============================================================
       RESET
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-head);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    ::selection { background: rgba(0,212,255,0.2); color: var(--text); }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: var(--r-sm); }

    button { font-family: inherit; cursor: pointer; }
    input, textarea, select { font-family: inherit; }

    /* ============================================================
       ANIMATIONS
       ============================================================ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%,100% { opacity:1; }
      50%      { opacity:0.4; }
    }
    @keyframes fillBar {
      from { width: 0; }
      to   { width: var(--w); }
    }
    @keyframes slideIn {
      from { opacity:0; transform:translateX(-16px); }
      to   { opacity:1; transform:translateX(0); }
    }
    @keyframes borderPulse {
      0%,100% { border-color: rgba(0,212,255,0.15); }
      50%      { border-color: rgba(0,212,255,0.4); }
    }
    @keyframes shimmer {
      0%   { transform: translateX(-20px); }
      100% { transform: translateX(20px); }
    }

    /* ============================================================
       LAYOUT
       ============================================================ */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(7,7,26,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }

    .topbar__left { display: flex; align-items: center; gap: 14px; }
    .topbar__back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.82rem; color: var(--text-2);
      transition: color 0.2s;
    }
    .topbar__back:hover { color: var(--accent); }
    .topbar__sep { width: 1px; height: 18px; background: var(--border); }
    .topbar__title {
      font-family: var(--font-mono); font-size: 0.82rem;
      color: var(--text); font-weight: 700;
    }

    .topbar__badge {
      font-family: var(--font-mono); font-size: 0.65rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent); background: rgba(0,212,255,0.08);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 99px; padding: 2px 10px;
    }

    .container {
      max-width: 1280px; margin: 0 auto; padding: 0 28px;
      width: 100%;
    }

    .main { flex: 1; padding: 28px 0 48px; }

    /* ============================================================
       GRID
       ============================================================ */
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      grid-template-rows: auto 1fr;
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    /* ============================================================
       PANEL (shared)
       ============================================================ */
    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 22px;
      transition: border-color 0.25s;
    }
    .panel:hover { border-color: rgba(0,212,255,0.15); }

    .panel__title {
      font-size: 0.78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-2);
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .panel__title-icon { font-size: 1rem; }

    /* ============================================================
       INPUT PANEL
       ============================================================ */
    .input-panel { grid-row: 1 / 3; }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 0.78rem; font-weight: 600;
      color: var(--text-2); margin-bottom: 6px;
    }
    .form-group input[type="text"],
    .form-group select {
      width: 100%;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text);
      padding: 9px 12px;
      font-size: 0.875rem;
      transition: border-color 0.2s;
    }
    .form-group input[type="text"]:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .form-group textarea {
      width: 100%; min-height: 130px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.78rem;
      font-family: var(--font-mono);
      line-height: 1.5;
      resize: vertical;
      transition: border-color 0.2s;
    }
    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .form-group textarea::placeholder { color: var(--text-3); }

    .form-actions {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 20px;
    }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 16px; border-radius: var(--r-sm);
      font-size: 0.82rem; font-weight: 600;
      border: 1px solid transparent;
      transition: var(--transition);
      cursor: pointer; white-space: nowrap;
    }
    .btn--primary {
      background: var(--grad-accent);
      color: #07071A;
      border-color: transparent;
    }
    .btn--primary:hover:not(:disabled) {
      box-shadow: 0 4px 20px rgba(0,212,255,0.35);
      transform: translateY(-1px);
    }
    .btn--secondary {
      background: rgba(0,212,255,0.07);
      border-color: var(--border-accent);
      color: var(--accent);
    }
    .btn--secondary:hover:not(:disabled) {
      background: rgba(0,212,255,0.14);
      transform: translateY(-1px);
    }
    .btn--ghost {
      background: transparent;
      border-color: var(--border);
      color: var(--text-2);
    }
    .btn--ghost:hover:not(:disabled) {
      border-color: rgba(255,255,255,0.15);
      color: var(--text);
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .divider {
      border: none; border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    /* Failure rate */
    .rate-control { margin-top: 4px; }
    .rate-control input[type="range"] {
      width: 100%; height: 3px;
      appearance: none; -webkit-appearance: none;
      background: rgba(255,255,255,0.08);
      border-radius: 2px; outline: none; cursor: pointer;
    }
    .rate-control input[type="range"]::-webkit-slider-thumb {
      appearance: none; -webkit-appearance: none;
      width: 16px; height: 16px;
      background: var(--grad-accent);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(0,212,255,0.5);
      cursor: pointer;
    }
    .rate-value {
      font-family: var(--font-mono); font-size: 0.72rem;
      color: var(--accent); margin-top: 6px; display: block; text-align: right;
    }

    /* ============================================================
       METRICS
       ============================================================ */
    .metrics-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    @media (max-width: 600px) { .metrics-row { grid-template-columns: repeat(2,1fr); } }

    .metric-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 16px;
      text-align: center;
      animation: borderPulse 4s ease-in-out infinite;
      transition: var(--transition);
    }
    .metric-card:hover { transform: translateY(-2px); border-color: var(--border-accent); }
    .metric-card__label {
      font-size: 0.65rem; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-3);
      margin-bottom: 8px; display: block;
    }
    .metric-card__value {
      font-size: 2rem; font-weight: 800;
      background: var(--grad-accent);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    /* ============================================================
       QUEUE DISPLAY
       ============================================================ */
    .queue-panel {}

    .queue-list {
      display: flex; flex-direction: column; gap: 6px;
      max-height: 280px; overflow-y: auto;
    }

    .queue-item {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 8px 12px;
      font-size: 0.78rem;
      font-family: var(--font-mono);
      animation: slideIn 0.2s ease-out;
      transition: border-color 0.2s;
    }
    .queue-item:hover { border-color: var(--border-accent); }
    .queue-item--processing { border-left: 3px solid var(--accent); }
    .queue-item--done { border-left: 3px solid var(--accent-2); }
    .queue-item--error { border-left: 3px solid var(--accent-3); }
    .queue-item--pending { border-left: 3px solid var(--text-3); }

    .queue-item__id { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .queue-item__prio { font-size: 0.7rem; }
    .queue-item__status {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.06em;
      padding: 2px 7px; border-radius: 99px;
    }
    .queue-item__status--pending   { background: rgba(90,90,117,0.2); color: var(--text-3); }
    .queue-item__status--processing{ background: rgba(0,212,255,0.12); color: var(--accent); }
    .queue-item__status--done      { background: rgba(0,255,148,0.12); color: var(--accent-2); }
    .queue-item__status--error     { background: rgba(255,45,107,0.12); color: var(--accent-3); }
    .queue-item__time { font-size: 0.68rem; color: var(--text-3); }

    .queue-empty {
      text-align: center; padding: 40px 20px;
      color: var(--text-3); font-size: 0.875rem;
    }
    .queue-empty__icon { font-size: 2rem; margin-bottom: 10px; opacity: 0.4; }

    /* ============================================================
       LOG PANEL
       ============================================================ */
    .log-panel {}

    .log-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .log-header h2 { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-2); }

    .log-container {
      display: flex; flex-direction: column; gap: 3px;
      max-height: 320px; overflow-y: auto;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 12px;
    }

    .log-entry {
      display: flex; align-items: flex-start; gap: 8px;
      font-family: var(--font-mono); font-size: 0.72rem;
      line-height: 1.5; padding: 3px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      animation: slideIn 0.18s ease-out;
    }
    .log-entry:last-child { border-bottom: none; }

    .log-entry__time { color: var(--text-3); flex-shrink: 0; min-width: 70px; }
    .log-entry__lvl {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.05em;
      min-width: 42px; text-align: center;
      padding: 1px 5px; border-radius: 3px; flex-shrink: 0;
    }
    .log-entry__lvl--info    { background: rgba(6,182,212,0.12); color: #06b6d4; }
    .log-entry__lvl--success { background: rgba(0,255,148,0.12); color: #00ff94; }
    .log-entry__lvl--error   { background: rgba(255,45,107,0.12); color: #ff2d6b; }
    .log-entry__lvl--warn    { background: rgba(245,158,11,0.12); color: #f59e0b; }
    .log-entry__lvl--debug   { background: rgba(90,90,117,0.2); color: var(--text-3); }
    .log-entry__msg { color: var(--text-2); flex: 1; word-break: break-all; }
    </style>
</head>
<body>

<div class="page">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar__left">
      <a href="index.html" class="topbar__back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Voltar ao portfólio
      </a>
      <div class="topbar__sep"></div>
      <span class="topbar__title">Simulador de Pipeline de Dados</span>
    </div>
    <span class="topbar__badge">Demo Interativa</span>
  </div>

  <!-- MAIN -->
  <main class="main">
    <div class="container">

      <!-- METRICS -->
      <div class="metrics-row" style="margin-bottom:20px;">
        <div class="metric-card">
          <span class="metric-card__label">Pendentes</span>
          <span class="metric-card__value" id="metric-pending">0</span>
        </div>
        <div class="metric-card">
          <span class="metric-card__label">Processando</span>
          <span class="metric-card__value" id="metric-processing">0</span>
        </div>
        <div class="metric-card">
          <span class="metric-card__label">Concluídos</span>
          <span class="metric-card__value" id="metric-completed">0</span>
        </div>
        <div class="metric-card">
          <span class="metric-card__label">Erros</span>
          <span class="metric-card__value" id="metric-error">0</span>
        </div>
      </div>

      <!-- LAYOUT -->
      <div class="layout">

        <!-- INPUT PANEL -->
        <aside class="panel input-panel">
          <div class="panel__title">
            <span class="panel__title-icon">📥</span>
            Novo Job
          </div>

          <form id="job-form" novalidate>
            <div class="form-group">
              <label for="job-name">Nome do Job</label>
              <input type="text" id="job-name" placeholder="Ex: Processar Pedido #1001" autocomplete="off">
            </div>

            <div class="form-group">
              <label for="job-data">Dados (JSON)</label>
              <textarea id="job-data" placeholder='{ "orderId": 1001, "amount": 299.99 }'></textarea>
            </div>

            <div class="form-group">
              <label for="job-priority">Prioridade</label>
              <select id="job-priority">
                <option value="0">Normal</option>
                <option value="1">Alta</option>
                <option value="2">Crítica</option>
              </select>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn--primary" style="flex:1;">Enviar Job</button>
              <button type="button" id="btn-generate" class="btn btn--secondary">🎲</button>
            </div>
          </form>

          <hr class="divider">

          <div class="panel__title">
            <span class="panel__title-icon">⚙️</span>
            Controles
          </div>

          <div class="form-actions">
            <button id="btn-start" class="btn btn--primary">▶ Iniciar</button>
            <button id="btn-stop" class="btn btn--secondary" disabled>⏹ Parar</button>
            <button id="btn-clear" class="btn btn--ghost">🗑</button>
          </div>

          <div class="form-group rate-control">
            <label>Taxa de Falha (simulação)</label>
            <input type="range" id="failure-rate" min="0" max="50" value="10">
            <span class="rate-value" id="failure-rate-value">10%</span>
          </div>
        </aside>

        <!-- QUEUE PANEL -->
        <section class="panel queue-panel">
          <div class="panel__title">
            <span class="panel__title-icon">📤</span>
            Fila de Processamento
            <span id="queue-count" style="margin-left:auto;font-family:var(--font-mono);font-size:0.65rem;color:var(--accent);"></span>
          </div>
          <div class="queue-list" id="queue-container">
            <div class="queue-empty">
              <div class="queue-empty__icon">📭</div>
              <p>Nenhum job na fila.<br>Envie um job para começar.</p>
            </div>
          </div>
        </section>

        <!-- LOG PANEL -->
        <section class="panel log-panel">
          <div class="log-header">
            <h2>📋 Log de Execução</h2>
            <button id="btn-export-logs" class="btn btn--ghost" style="padding:4px 10px;font-size:0.7rem;">Exportar JSON</button>
          </div>
          <div class="log-container" id="log-container"></div>
        </section>

      </div><!-- /.layout -->
    </div><!-- /.container -->
  </main>
</div><!-- /.page -->

<script type="module" src="js/pipeline-simulator.js"></script>
</body>
</html>
